{% extends 'base.html' %}

{% block title %}Register Model{% endblock %}

{% block content %}
<div class="dashboard-page">
    <div class="dashboard-card ml-panel" style="max-width:850px;">
        <div class="dashboard-top">
            <div>
                <p class="dashboard-role">ML Engineer</p>
                <h1>Register model</h1>
                <p class="dashboard-subtitle">
                    Add a new model version and its evaluation metrics.
                </p>
            </div>
        </div>

        <form method="POST" action="{{ url_for('create_model') }}">
            <div class="input-group">
                <label for="name">Model name</label>
                <input type="text" id="name" name="name" required>
            </div>

            <div class="input-group">
                <label for="version">Version</label>
                <input type="text" id="version" name="version" required>
            </div>

            <div class="input-group">
                <label for="model_type">Model type</label>
                <input type="text" id="model_type" name="model_type" placeholder="e.g. LSTM, GRU, MLP">
            </div>

            <div class="input-group">
                <label for="dataset_name">Dataset</label>
                <input type="text" id="dataset_name" name="dataset_name" placeholder="e.g. NSL-KDD">
            </div>

            <div class="input-group">
                <label for="accuracy">Accuracy</label>
                <input type="number" step="0.01" id="accuracy" name="accuracy">
            </div>

            <div class="input-group">
                <label for="precision_score">Precision</label>
                <input type="number" step="0.01" id="precision_score" name="precision_score">
            </div>

            <div class="input-group">
                <label for="recall_score">Recall</label>
                <input type="number" step="0.01" id="recall_score" name="recall_score">
            </div>

            <div class="input-group">
                <label for="f1_score">F1 Score</label>
                <input type="number" step="0.01" id="f1_score" name="f1_score">
            </div>

            <div style="display:flex; gap:12px; margin-top:20px;">
                <button type="submit" class="btn-primary">Save model</button>
                <a href="{{ url_for('ml_dashboard') }}" class="btn-primary" style="background:#475569;">Back</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
