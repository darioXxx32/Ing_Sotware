{% extends 'base.html' %}

{% block title %}Edit User{% endblock %}

{% block content %}
<div class="dashboard-page">
    <div class="dashboard-card" style="max-width:700px;">
        <div class="dashboard-top">
            <div>
                <p class="dashboard-role">Administrator</p>
                <h1>Edit user</h1>
                <p class="dashboard-subtitle">Update account information and permissions.</p>
            </div>
        </div>

        <form method="POST" action="{{ url_for('edit_user', user_id=user.id) }}">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" value="{{ user.username }}" required>
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" name="email" id="email" value="{{ user.email }}" required>
            </div>

            <div class="input-group">
                <label for="role_id">Role</label>
                <select name="role_id" id="role_id" required class="input-select">
                    {% for role in roles %}
                        <option value="{{ role.id }}" {% if role.id == user.role_id %}selected{% endif %}>{{ role.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="input-group">
                <label>
                    <input type="checkbox" name="is_active" {% if user.is_active %}checked{% endif %}>
                    Active account
                </label>
            </div>

            <div style="display:flex; gap:12px; margin-top:20px;">
                <button type="submit" class="btn-primary">Update user</button>
                <a href="{{ url_for('manage_users') }}" class="btn-primary" style="background:#475569;">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
